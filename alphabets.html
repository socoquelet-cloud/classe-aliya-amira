<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>✨ Les Alphabets</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Patrick+Hand&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent;font-family:'Nunito',sans-serif}
#app{min-height:100vh}

:root{
--pink:#FF6B9D;--gold:#FF9500;--blue:#4A90D9;--green:#4CAF50;
--purple:#9B59B6;--teal:#1ABC9C;--red:#E74C3C;--orange:#FF7043;
--ar-green:#2E7D32;--en-blue:#1565C0;
--bg:linear-gradient(135deg,#FFF8F0 0%,#FFF0FA 50%,#F0F8FF 100%);
--ar:'Noto Naskh Arabic',serif;
--en:'Patrick Hand',cursive;
}

@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.28)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
@keyframes appear{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
@keyframes cfall{to{transform:translateY(115vh) rotate(720deg);opacity:0}}

.cp{position:fixed;top:-20px;border-radius:50%;pointer-events:none;z-index:9999;animation:cfall 2.2s ease-in forwards}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(40,40,70,.95);border-radius:14px;padding:10px 20px;font-size:13px;font-weight:700;color:#fff;z-index:500;animation:fadeUp .3s ease both;white-space:nowrap}

/* ── HOME ── */
.home{min-height:100vh;background:var(--bg);padding:22px 16px 60px}
.hero{text-align:center;margin-bottom:20px;animation:fadeDown .5s ease both}
.hero-emoji{font-size:56px;display:block;animation:bounce 2.5s infinite;margin-bottom:6px}
.hero-title{font-size:24px;font-weight:900;background:linear-gradient(90deg,var(--en-blue),var(--ar-green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:12px;color:#bbb;font-weight:700;margin-top:2px}

/* alpha tabs */
.alpha-tabs{display:flex;background:#fff;border-radius:22px;padding:4px;gap:4px;max-width:360px;margin:0 auto 20px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.at-btn{flex:1;border:none;border-radius:18px;padding:9px 8px;font-weight:800;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;text-align:center;line-height:1.3}
.at-btn.active{color:#fff}
.at-btn:not(.active){background:transparent;color:#bbb}

/* progress strip */
.prog-strip{background:#fff;border-radius:16px;padding:12px 16px;max-width:440px;margin:0 auto 18px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.prog-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;font-weight:700;color:#888}
.prog-row span:last-child{color:var(--gold)}
.bar-track{background:#F0F0F0;border-radius:99px;height:9px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .6s}

/* mode grid */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;max-width:440px;margin:0 auto}
.mode-card{background:#fff;border-radius:18px;padding:16px 12px;text-align:center;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.07);border:2.5px solid transparent;transition:all .2s;animation:fadeUp .4s ease both}
.mode-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.11)}
.mode-card:active{transform:scale(.96)}
.mc-icon{font-size:34px;margin-bottom:7px}
.mc-title{font-weight:900;font-size:13px;margin-bottom:2px}
.mc-desc{font-size:10px;color:#aaa;line-height:1.4}

/* letter grid */
.letter-grid-title{font-weight:900;color:#666;font-size:13px;max-width:440px;margin:18px auto 9px}
.letter-grid{display:grid;gap:7px;max-width:440px;margin:0 auto}
.en-grid{grid-template-columns:repeat(7,1fr)}
.ar-grid{grid-template-columns:repeat(7,1fr);direction:rtl}
.lg-cell{background:#fff;border-radius:11px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.06);border:2px solid transparent;transition:all .18s;position:relative}
.lg-cell:active{transform:scale(.9)}
.lg-cell.learned{border-color:var(--green)}
.lg-cell .lc-letter{font-size:18px;font-weight:800;line-height:1}
.lg-cell .lc-dot{width:5px;height:5px;border-radius:50%;margin-top:3px}
.lg-cell .lc-check{position:absolute;top:1px;right:2px;font-size:8px}
.ar-cell .lc-letter{font-family:var(--ar);font-size:20px}

/* ── PAGE ── */
.page{min-height:100vh;background:var(--bg);padding:16px 14px 56px;display:flex;flex-direction:column;align-items:center}
.back-btn{align-self:flex-start;background:rgba(0,0,0,.07);border:none;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;font-family:'Nunito',sans-serif;color:#666;margin-bottom:12px;font-weight:700}

/* ── ENGLISH LETTER CARD ── */
.en-letter-card{background:#fff;border-radius:24px;padding:22px 18px;text-align:center;width:100%;max-width:380px;box-shadow:0 6px 20px rgba(0,0,0,.09);margin-bottom:16px;border-top:5px solid var(--en-blue)}
.en-big{font-family:var(--en);font-size:88px;font-weight:700;line-height:1;color:var(--en-blue)}
.en-forms{display:flex;justify-content:center;gap:20px;margin:8px 0 12px}
.en-form{text-align:center}
.en-form-label{font-size:9px;color:#bbb;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.en-form-letter{font-family:var(--en);font-size:32px;font-weight:700;color:var(--en-blue);line-height:1}
.en-word{font-family:var(--en);font-size:26px;font-weight:700;color:#444;margin-bottom:4px}
.en-highlight{color:var(--en-blue)}
.en-tip{font-size:11px;color:#ccc;font-style:italic;margin-top:6px}

/* ── ARABIC LETTER CARD ── */
.ar-letter-card{background:#fff;border-radius:24px;padding:22px 18px;text-align:center;width:100%;max-width:380px;box-shadow:0 6px 20px rgba(0,0,0,.09);margin-bottom:16px;border-top:5px solid var(--ar-green)}
.ar-big{font-family:var(--ar);font-size:80px;font-weight:700;line-height:1.3;color:var(--ar-green);direction:rtl}
.ar-name{font-size:18px;font-weight:900;color:#555;margin:4px 0 2px}
.ar-sound{font-size:13px;color:#888;margin-bottom:12px}

/* 4 forms grid */
.forms-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin:12px 0;width:100%}
.form-box{background:#F8F8F8;border-radius:14px;padding:10px 6px;text-align:center}
.form-box-label{font-size:9px;color:#aaa;font-weight:700;text-transform:uppercase;margin-bottom:5px}
.form-box-letter{font-family:var(--ar);font-size:26px;font-weight:700;direction:rtl;line-height:1.4}
.form-box.isolated{border:2px solid var(--ar-green)}
.form-box.initial .form-box-letter{color:#1565C0}
.form-box.medial .form-box-letter{color:#9B59B6}
.form-box.final .form-box-letter{color:#E74C3C}

.ar-word-box{background:linear-gradient(135deg,#E8F5E9,#F1F8E9);border-radius:16px;padding:14px;text-align:center;margin-top:6px}
.ar-word{font-family:var(--ar);font-size:32px;font-weight:700;direction:rtl;color:var(--ar-green);margin-bottom:4px}
.ar-word-fr{font-size:13px;color:#888;font-style:italic}
.ar-word-emoji{font-size:28px;margin-bottom:4px}

/* buttons */
.btn{border:none;border-radius:14px;padding:11px 22px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .12s;color:#fff}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.25;cursor:not-allowed}
.btn-ghost{background:rgba(0,0,0,.08);color:#666}
.btn-row{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.dots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;max-width:320px;margin-top:6px}
.dot{width:8px;height:8px;border-radius:50%;cursor:pointer;transition:background .25s}

/* quiz */
.quiz-q{background:#fff;border-radius:20px;padding:20px 16px;text-align:center;width:100%;max-width:380px;box-shadow:0 5px 16px rgba(0,0,0,.08);margin-bottom:14px}
.quiz-opts-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:380px}
.q-opt{background:#F8F8F8;border:2.5px solid #EEE;border-radius:14px;padding:14px 8px;cursor:pointer;font-weight:800;font-size:14px;text-align:center;transition:all .2s;color:#444;font-family:'Nunito',sans-serif}
.q-opt:active{transform:scale(.95)}
.q-opt.correct{background:#E8F5E9;border-color:var(--green);color:#2E7D32;animation:pop .35s ease}
.q-opt.wrong{background:#FFEBEE;border-color:var(--red);color:#C62828;animation:shake .35s ease}
.q-opt .ar-opt{font-family:var(--ar);font-size:32px;direction:rtl;display:block;margin-bottom:4px}
.q-opt .en-opt{font-family:var(--en);font-size:28px;display:block;margin-bottom:4px}

/* feedback */
.feedback{min-height:38px;font-size:22px;font-weight:900;text-align:center;margin:6px 0}

/* result */
.result{text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;animation:slideUp .4s ease both;padding-top:22px}
.result-big{font-size:70px;animation:pop .5s ease both}
.stars-row{display:flex;gap:5px;font-size:26px}

/* nav counter */
.nav-counter{font-size:11px;color:#bbb;font-weight:700;margin-bottom:12px}
</style>

</head>
<body>

<script>

// ── Storage ──────────────────────────────────────
function loadLS(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

// ── State ─────────────────────────────────────────
let ST = {
page: 'home',
alpha: 'en',          // 'en' | 'ar'
idx: 0,               // current letter index in discover/flashcard
// quiz
quizType: null,       // 'name-to-letter' | 'letter-to-name' | 'en-letter-to-word' | 'en-word-to-letter'
quizPool: [], quizIdx: 0, quizAns: null, quizScore: 0,
feedback: '',
// learned
enLearned: loadLS('alpha_en_learned', {}),
arLearned: loadLS('alpha_ar_learned', {}),
enStars:   loadLS('alpha_en_stars', 0),
arStars:   loadLS('alpha_ar_stars', 0),
};

function setState(p){Object.assign(ST,p);render()}
function save(){
saveLS('alpha_en_learned',ST.enLearned);
saveLS('alpha_ar_learned',ST.arLearned);
saveLS('alpha_en_stars',ST.enStars);
saveLS('alpha_ar_stars',ST.arStars);
}
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}

function toast(msg){

// ── Quiz builders ──────────────────────────────────
function makeEnQuiz(type){
// type: 'letter-to-word' = see letter, pick word | 'word-to-letter' = see word, pick letter
return shuffle(EN_ALPHA).slice(0,12).map(correct=>{
const others = shuffle(EN_ALPHA.filter(x=>x.l!==correct.l)).slice(0,3);
return {correct, opts: shuffle([correct,...others]), type};
});
}

function makeArQuiz(type){
// type: 'name-to-letter' = see name, pick isolated form
//       'letter-to-name' = see isolated letter, pick name
//       'form-match' = see word form, pick letter name
return shuffle(AR_ALPHA).slice(0,10).map(correct=>{
const others = shuffle(AR_ALPHA.filter(x=>x.id!==correct.id)).slice(0,3);
return {correct, opts: shuffle([correct,...others]), type};
});
}

// ── Actions ───────────────────────────────────────
function openMode(id){
if(id==='en-discover') setState({page:'en-letter',alpha:'en',idx:0});
else if(id==='en-grid') setState({page:'home',alpha:'en'});
else if(id==='en-quiz-l2w') setState({page:'en-quiz',alpha:'en',quizType:'letter-to-word',quizPool:[],quizIdx:0,quizScore:0,quizAns:null,feedback:''});
else if(id==='en-quiz-w2l') setState({page:'en-quiz',alpha:'en',quizType:'word-to-letter',quizPool:[],quizIdx:0,quizScore:0,quizAns:null,feedback:''});
else if(id==='ar-discover') setState({page:'ar-letter',alpha:'ar',idx:0});
else if(id==='ar-quiz-l2n') setState({page:'ar-quiz',alpha:'ar',quizType:'letter-to-name',quizPool:[],quizIdx:0,quizScore:0,quizAns:null,feedback:''});
else if(id==='ar-quiz-n2l') setState({page:'ar-quiz',alpha:'ar',quizType:'name-to-letter',quizPool:[],quizIdx:0,quizScore:0,quizAns:null,feedback:''});
else if(id==='ar-quiz-form') setState({page:'ar-quiz',alpha:'ar',quizType:'form-match',quizPool:[],quizIdx:0,quizScore:0,quizAns:null,feedback:''});
}

function openLetter(lang,i){
setState({page:lang+'-letter',alpha:lang,idx:i});
}

function markEn(i){
const L=EN_ALPHA[i];
if(!ST.enLearned[L.l]){
ST.enLearned[L.l]=true;
ST.enStars=Math.min(ST.enStars+1,99);
save();toast('⭐ '+L.l+' apprise !');render();
}
}

function markAr(i){
const L=AR_ALPHA[i];
if(!ST.arLearned[L.id]){
ST.arLearned[L.id]=true;
ST.arStars=Math.min(ST.arStars+1,99);
save();toast('⭐ '+L.name+' apprise !');render();
}
}

function answerQuiz(optIdx){
if(ST.quizAns!==null) return;
const Q=ST.quizPool[ST.quizIdx];
const chosen=Q.opts[optIdx];
const isAr=ST.page==='ar-quiz';
const isCorrect=isAr?(chosen.id===Q.correct.id):(chosen.l===Q.correct.l);
const score=isCorrect?ST.quizScore+1:ST.quizScore;
if(isCorrect){
if(isAr) markAr(AR_ALPHA.findIndex(x=>x.id===Q.correct.id));
else markEn(EN_ALPHA.findIndex(x=>x.l===Q.correct.l));
}
ST.quizAns=optIdx;ST.quizScore=score;ST.feedback=isCorrect?'correct':'wrong';
render();
setTimeout(()=>{
const next=ST.quizIdx+1;
if(next>=ST.quizPool.length){showResult(isAr?'ar':'en');return;}
ST.quizIdx=next;ST.quizAns=null;ST.feedback='';render();
},1100);
}

function showResult(lang){
ST.alpha=lang;
const pct=Math.round(ST.quizScore/ST.quizPool.length*100);
const s=pct>=80?3:pct>=55?2:1;
if(lang==='en') ST.enStars=Math.max(ST.enStars,s);
else ST.arStars=Math.max(ST.arStars,s);
save();setState({page:'result'});
if(s===3) confetti();
}

function replayQuiz(){
const isAr=ST.alpha==='ar';
const pool=isAr?makeArQuiz(ST.quizType):makeEnQuiz(ST.quizType);
setState({quizPool:pool,quizIdx:0,quizScore:0,quizAns:null,feedback:'',page:isAr?'ar-quiz':'en-quiz'});
}

render();
</script>
