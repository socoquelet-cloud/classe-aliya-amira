<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>✨ Coloriages</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent;font-family:'Nunito',sans-serif}
#app{min-height:100vh}
:root{
  --pink:#FF6B9D;--gold:#FF9500;--blue:#4A90D9;--green:#4CAF50;
  --purple:#9B59B6;--teal:#1ABC9C;--red:#E74C3C;
  --bg:linear-gradient(135deg,#FFF8F0 0%,#FFF0FA 50%,#F0F8FF 100%);
}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
@keyframes cfall{to{transform:translateY(115vh) rotate(720deg);opacity:0}}
@keyframes sparkle{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(0)}}
.cp{position:fixed;top:-20px;border-radius:50%;pointer-events:none;z-index:9999;animation:cfall 2.2s ease-in forwards}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(40,40,70,.95);border-radius:14px;padding:10px 20px;font-size:13px;font-weight:700;color:#fff;z-index:500;animation:fadeUp .3s ease both;white-space:nowrap}

/* ── HOME ── */
.home{min-height:100vh;background:var(--bg);padding:20px 16px 60px}
.hero{text-align:center;margin-bottom:20px;animation:fadeDown .5s ease both}
.hero-emoji{font-size:54px;display:block;animation:wiggle 2.5s infinite;margin-bottom:6px}
.hero-title{font-size:24px;font-weight:900;background:linear-gradient(90deg,#FF6B9D,#FF9500,#4A90D9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:12px;color:#bbb;font-weight:700;margin-top:2px}

/* coloring grid */
.coloring-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;max-width:440px;margin:0 auto}
.coloring-thumb{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.09);cursor:pointer;transition:all .2s;animation:fadeUp .4s ease both;border:3px solid transparent;position:relative}
.coloring-thumb:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.13)}
.coloring-thumb:active{transform:scale(.96)}
.ct-preview{width:100%;height:130px;display:flex;align-items:center;justify-content:center;padding:8px}
.ct-preview svg{width:100%;height:100%;max-height:118px}
.ct-info{padding:10px 12px 12px}
.ct-title{font-weight:900;font-size:14px;margin-bottom:2px}
.ct-sub{font-size:10px;color:#aaa}
.ct-progress{margin-top:6px;height:5px;background:#F0F0F0;border-radius:4px;overflow:hidden}
.ct-fill{height:100%;border-radius:4px;transition:width .4s}
.ct-done-badge{position:absolute;top:8px;right:8px;background:var(--green);color:#fff;font-size:10px;font-weight:900;border-radius:10px;padding:2px 8px}

/* ── COLORING PAGE ── */
.coloring-page{min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
.col-header{background:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.08);position:sticky;top:0;z-index:100}
.col-back{background:rgba(0,0,0,.07);border:none;border-radius:18px;padding:6px 13px;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;color:#666}
.col-title{font-weight:900;font-size:15px;color:#444}
.col-reset{background:#FFE4EC;border:none;border-radius:18px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;color:var(--pink)}

/* mode toggle */
.mode-toggle{display:flex;background:#F0F0F0;border-radius:18px;padding:3px;gap:3px;margin:10px 14px 0}
.mt-btn{flex:1;border:none;border-radius:15px;padding:7px 8px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s}
.mt-btn.active{background:#fff;color:var(--pink);box-shadow:0 2px 6px rgba(0,0,0,.1)}
.mt-btn:not(.active){background:transparent;color:#aaa}

/* instruction banner */
.instruction{margin:10px 14px;background:#fff;border-radius:16px;padding:11px 14px;box-shadow:0 2px 8px rgba(0,0,0,.07);border-left:4px solid var(--gold)}
.inst-step{font-size:11px;color:#aaa;font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.inst-main{font-size:14px;font-weight:800;color:#444;line-height:1.4}
.inst-langs{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.inst-lang{font-size:11px;font-weight:700;color:#888;background:#F8F8F8;border-radius:8px;padding:3px 8px}

/* canvas area */
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;padding:10px 14px;overflow:hidden}
.canvas-area svg{width:100%;max-width:360px;height:auto;touch-action:none}
.canvas-area svg path,
.canvas-area svg ellipse,
.canvas-area svg circle,
.canvas-area svg rect,
.canvas-area svg polygon{cursor:pointer;transition:filter .15s}
.canvas-area svg path:hover,
.canvas-area svg ellipse:hover,
.canvas-area svg circle:hover,
.canvas-area svg rect:hover,
.canvas-area svg polygon:hover{filter:brightness(.92)}

/* color palette */
.palette-wrap{background:#fff;padding:10px 14px 14px;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.palette-label{font-size:10px;font-weight:800;color:#bbb;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.palette{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.color-swatch{width:38px;height:38px;border-radius:50%;cursor:pointer;transition:all .18s;border:3px solid transparent;position:relative;flex-shrink:0}
.color-swatch:active{transform:scale(.88)}
.color-swatch.selected{border-color:#333;transform:scale(1.18);box-shadow:0 4px 12px rgba(0,0,0,.25)}
.color-swatch.eraser{background:repeating-linear-gradient(45deg,#f0f0f0,#f0f0f0 4px,#e0e0e0 4px,#e0e0e0 8px);border-color:#ddd}
.color-swatch.eraser.selected{border-color:#888}

/* number legend */
.num-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;justify-content:center}
.num-chip{display:flex;align-items:center;gap:4px;background:#F8F8F8;border-radius:10px;padding:4px 8px;font-size:11px;font-weight:800}
.num-dot{width:14px;height:14px;border-radius:50%}

/* completion overlay */
.completion-overlay{position:fixed;inset:0;background:rgba(255,255,255,.95);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeUp .4s ease both}
.co-emoji{font-size:72px;animation:pop .5s ease both;margin-bottom:16px}
.co-title{font-size:24px;font-weight:900;color:#FF9500;margin-bottom:8px}
.co-sub{font-size:14px;color:#888;text-align:center;margin-bottom:24px}
</style>

</head>

function loadLS(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

let ST = {
page: 'home',
pageId: null,
mode: 'guided',       // 'guided' | 'free'
selectedColor: 'red',
instructionIdx: 0,
showComplete: false,
showReset: false,     // in-app reset confirmation
// per-page colors: {pageId: {zoneId: colorId}}
colors: loadLS('coloring_colors', {}),
};

function setState(p){Object.assign(ST,p);render()}
function saveColors(){saveLS('coloring_colors', ST.colors)}

function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function confetti(){
const c=['#FFD700','#FF9500','#FF6B9D','#4A90D9','#4CAF50','#9B59B6'];
for(let i=0;i<50;i++){
const el=document.createElement('div');el.className='cp';
const sz=6+Math.random()*14;
el.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${c[~~(Math.random()*6)]};animation-delay:${Math.random()*.8}s;`;
document.body.appendChild(el);setTimeout(()=>el.remove(),3000);
}
}
function toast(msg){
const el=document.createElement('div');el.className='toast';el.textContent=msg;
document.body.appendChild(el);setTimeout(()=>el.remove(),2000);
}

function getPageColors(pageId){
return ST.colors[pageId] || {};
}

function countColored(pageId){
const pg = PAGES.find(p=>p.id===pageId);
if(!pg) return 0;
const c = getPageColors(pageId);
const filled = new Set();
pg.zones.forEach(z=>{if(c[z.id]) filled.add(z.id);});
return filled.size;
}

function isPageComplete(pageId){
const pg = PAGES.find(p=>p.id===pageId);
if(!pg) return false;
return countColored(pageId)>=pg.zones.length;
}

function render(){
const app = document.getElementById('app');
const {page,pageId,mode,selectedColor,instructionIdx,showComplete} = ST;

// ─ HOME ─
if(page==='home'){
app.innerHTML=`

<span class="hero-emoji">🎨</span>

</div>

  <div class="coloring-grid">
    ${PAGES.map((pg,i)=>{
      const done=countColored(pg.id);
      const total=pg.zones.length;
      const pct=Math.round(done/total*100);
      const complete=isPageComplete(pg.id);
      return`<div class="coloring-thumb" onclick="openPage('${pg.id}')"
        style="animation-delay:${i*.07}s;border-color:${pg.color}33">

        <div class="ct-info">

          <div class="ct-sub">${pg.zones.length} zones · ${done}/${total} colorié${done>1?'s':''}</div>

          </div>

  </div>
</div>`;

}

// ─ COLORING PAGE ─
else if(page==='coloring'){
const pg = PAGES.find(p=>p.id===pageId);
if(!pg){setState({page:'home'});return;}
const pageColors = getPageColors(pageId);

    if(col) hexColors[zid]=col.hex;
  }

app.innerHTML=`

    <button class="col-back" onclick="setState({page:'home',showComplete:false})">← Retour</button>

  ${mode==='guided'?`

    <div class="inst-step">Étape ${(instructionIdx%pg.instructions.length)+1}/${pg.instructions.length}</div>
    <div class="inst-main">🇫🇷 ${inst.fr}</div>

      <span class="inst-lang">🇲🇦 ${inst.darija}</span>
      <span class="inst-lang">🇬🇧 ${inst.en}</span>

  <div class="canvas-area" id="canvas-area">
    <svg viewBox="${pg.svgViewBox}" id="coloring-svg" style="touch-action:none;-webkit-user-select:none">
      ${pg.svg(hexColors)}

  </div>

  <div class="palette-wrap">
    <div class="palette-label">
      ${selColorObj?.hex?`<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${selColorObj.hex};vertical-align:middle;margin-right:5px"></span>`:''} 
      ${selColorObj?.label || 'Gomme'} — appuie sur une zone !
    </div>
    <div class="palette">
      ${PALETTE.map(col=>`
      <div class="color-swatch ${col.id==='eraser'?'eraser':''} ${selectedColor===col.id?'selected':''}"

      </div>`).join('')}

    ${mode==='guided'?`

function attachSVGHandlers(pg, pageColors, guidedZone){
const svg = document.getElementById('coloring-svg');
if(!svg) return;

// Highlight guided zone
if(guidedZone){
const els = svg.querySelectorAll(`#${guidedZone.id}`);
els.forEach(el=>{
el.style.filter='drop-shadow(0 0 8px rgba(255,149,0,.9))';
el.style.animation='pulse 1.5s infinite';
});
// Add pulse keyframe dynamically
if(!document.getElementById('pulse-kf')){
const s=document.createElement('style');
s.id='pulse-kf';
s.textContent='@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}';
document.head.appendChild(s);
}
}

// Click handler for all colorable elements
svg.addEventListener('click', e=>{
const target = e.target;
const id = target.id || target.closest('[id]')?.id;
if(!id) return;
const zone = pg.zones.find(z=>z.id===id);
if(!zone) return;

const colorId = ST.selectedColor;
if(!ST.colors[pg.id]) ST.colors[pg.id]={};

if(colorId==='eraser'){
  delete ST.colors[pg.id][id];
} else {
  ST.colors[pg.id][id] = colorId;
}
saveColors();

// Check completion
const done = countColored(pg.id);
const total = pg.zones.length;
if(done>=total && !ST.showComplete){
  confetti();
  ST.showComplete=true;
  // Advance instruction
  ST.instructionIdx++;
} else if(ST.mode==='guided'){
  // Auto-advance instruction when zone is colored
  const nextBlank = pg.zones.find(z=>!ST.colors[pg.id]?.[z.id]||ST.colors[pg.id]?.[z.id]==='eraser');
  const instForZone = pg.instructions.findIndex(ins=>ins.fr.toLowerCase().includes(zone.label.toLowerCase()));
  if(instForZone>=0) ST.instructionIdx=instForZone+1;
}

render();

});
}

// ── Actions ───────────────────────────────────────
function openPage(id){
setState({page:'coloring',pageId:id,showComplete:false,instructionIdx:0});
}

function resetPage(id){ setState({showReset:true}); }

function doReset(id){
if(ST.colors[id]){ delete ST.colors[id]; saveColors(); }
ST.showComplete=false;
ST.showReset=false;
ST.instructionIdx=0;
render();
toast('🔄 Coloriage réinitialisé !');
}

render();
</script>

</body>
