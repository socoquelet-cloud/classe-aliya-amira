<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Vocabulaire - Aliya et Amira</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:"Nunito",sans-serif;-webkit-tap-highlight-color:transparent}
#app{min-height:100vh}
:root{--pink:#FF6B9D;--gold:#FF9500;--blue:#4A90D9;--green:#4CAF50;--purple:#9B59B6}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes cfall{to{transform:translateY(115vh) rotate(720deg);opacity:0}}
@keyframes flip{0%{transform:rotateY(0)}100%{transform:rotateY(180deg)}}
.cp{position:fixed;top:-20px;border-radius:50%;pointer-events:none;z-index:9999;animation:cfall 2.2s ease-in forwards}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(40,40,70,.95);border-radius:14px;padding:10px 20px;font-size:13px;font-weight:700;color:#fff;z-index:500;animation:fadeUp .3s ease both;white-space:nowrap}

/* PICKER */
.picker{min-height:100vh;background:linear-gradient(135deg,#FFF0FA,#F0F8FF,#FFF8F0);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px}
.picker-title{font-size:24px;font-weight:900;background:linear-gradient(90deg,#FF9A9E,#4A90D9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;text-align:center}
.picker-sub{font-size:13px;color:#aaa;margin-bottom:28px;text-align:center;font-weight:700}
.profiles{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
.profile-card{background:#fff;border-radius:24px;padding:24px 20px;min-width:160px;text-align:center;box-shadow:0 8px 28px rgba(0,0,0,.1);cursor:pointer;transition:all .2s;border:3px solid transparent;animation:fadeUp .4s ease both}
.profile-card:hover{transform:translateY(-5px)}
.profile-card:active{transform:scale(.96)}
.pc-emoji{font-size:56px;display:block;margin-bottom:8px}
.pc-name{font-size:20px;font-weight:900;margin-bottom:8px}
.pc-cta{border:none;border-radius:16px;padding:10px 20px;font-weight:900;font-size:13px;cursor:pointer;font-family:"Nunito",sans-serif;color:#fff;width:100%}

/* MAIN */
.main{min-height:100vh;display:flex;flex-direction:column}
.header{padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.header-left{display:flex;align-items:center;gap:8px;flex:1}
.switch-btn{background:rgba(255,255,255,.3);border:none;border-radius:14px;padding:5px 10px;font-size:11px;font-weight:800;cursor:pointer;font-family:"Nunito",sans-serif;color:#fff}
.prog-bars{padding:8px 14px;display:flex;flex-direction:column;gap:5px}
.prog-row{display:flex;align-items:center;gap:8px}
.prog-flag{font-size:14px;width:20px}
.prog-label{font-size:10px;font-weight:700;color:#888;min-width:70px}
.prog-track{flex:1;height:7px;background:#F0F0F0;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .5s}
.prog-pct{font-size:9px;font-weight:800;color:#aaa;min-width:28px;text-align:right}

/* NAV TABS */
.nav-tabs{display:flex;background:#F8F8F8;padding:6px;gap:4px;border-radius:0}
.nav-tab{flex:1;border:none;border-radius:12px;padding:8px 4px;font-size:11px;font-weight:800;cursor:pointer;font-family:"Nunito",sans-serif;transition:all .2s}
.nav-tab.active{background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.1)}

/* LANG PILLS */
.lang-pills{display:flex;gap:6px;padding:8px 14px;overflow-x:auto}
.lang-pill{border:none;border-radius:18px;padding:6px 12px;font-size:11px;font-weight:800;cursor:pointer;font-family:"Nunito",sans-serif;white-space:nowrap;transition:all .18s}
.lang-pill.active{color:#fff}
.lang-pill:not(.active){background:#F0F0F0;color:#888}

/* CAT PILLS */
.cat-pills{display:flex;gap:6px;padding:4px 14px 8px;overflow-x:auto}
.cat-pill{border:none;border-radius:18px;padding:5px 12px;font-size:11px;font-weight:800;cursor:pointer;font-family:"Nunito",sans-serif;white-space:nowrap;transition:all .18s}
.cat-pill.active{color:#fff}
.cat-pill:not(.active){background:#F0F0F0;color:#888}

/* FLASHCARD */
.flashcard-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 14px 60px}
.card{background:#fff;border-radius:24px;width:100%;max-width:380px;box-shadow:0 8px 24px rgba(0,0,0,.1);padding:28px 20px;text-align:center;margin-bottom:14px;cursor:pointer;transition:transform .15s}
.card:active{transform:scale(.97)}
.card-emoji{font-size:72px;margin-bottom:10px;display:block}
.card-cat{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#bbb;margin-bottom:8px}
.card-word{font-size:38px;font-weight:900;margin-bottom:6px}
.card-word.rtl{direction:rtl;font-family:"Noto Naskh Arabic",serif;font-size:34px}
.card-back{margin-top:14px;border-top:1px solid #F0F0F0;padding-top:14px;display:flex;flex-direction:column;gap:8px}
.card-back-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#F8F8F8;border-radius:12px}
.back-flag{font-size:15px}
.back-word{font-size:15px;font-weight:700;color:#444}
.back-word.rtl{direction:rtl;font-family:"Noto Naskh Arabic",serif;font-size:17px;text-align:right;flex:1}
.hint{font-size:12px;color:#ccc;margin-top:6px}
.learned-badge{background:#E8F5E9;color:#2E7D32;border-radius:10px;padding:3px 10px;font-size:11px;font-weight:800;margin-top:6px;display:inline-block}

/* CARD NAV */
.card-nav{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.btn{border:none;border-radius:13px;padding:11px 22px;font-weight:800;font-size:13px;cursor:pointer;font-family:"Nunito",sans-serif;transition:transform .12s;color:#fff}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.25;cursor:not-allowed}
.btn-ghost{background:rgba(0,0,0,.08);color:#666}
.dots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;max-width:280px}
.dot{width:8px;height:8px;border-radius:50%;cursor:pointer;transition:background .2s}

/* QUIZ */
.quiz-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 14px 60px}
.quiz-q{background:#fff;border-radius:20px;padding:20px;text-align:center;width:100%;max-width:380px;box-shadow:0 5px 16px rgba(0,0,0,.08);margin-bottom:12px}
.quiz-score{font-size:14px;font-weight:900;color:var(--gold);margin-bottom:8px}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:380px}
.q-opt{border:2.5px solid #EEE;background:#F8F8F8;border-radius:13px;padding:13px 8px;cursor:pointer;font-family:"Nunito",sans-serif;font-weight:800;font-size:13px;text-align:center;transition:all .2s;color:#444}
.q-opt:active{transform:scale(.95)}
.q-opt.rtl-opt{direction:rtl;font-family:"Noto Naskh Arabic",serif;font-size:16px}
.q-opt.correct{background:#E8F5E9;border-color:#4CAF50;color:#2E7D32}
.q-opt.wrong{background:#FFEBEE;border-color:#F44336;color:#C62828}
.feedback{min-height:36px;font-size:22px;font-weight:900;text-align:center;margin:5px 0}

/* CATALOGUE */
.catalogue-area{flex:1;padding:8px 14px 60px}
.search-box{position:relative;margin-bottom:10px}
.search-box input{width:100%;background:#F8F8F8;border:1.5px solid #E8E8E8;border-radius:14px;padding:10px 14px 10px 36px;font-size:13px;font-family:"Nunito",sans-serif;outline:none}
.search-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.4}
.words-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.word-cell{background:#fff;border-radius:14px;padding:10px 6px;text-align:center;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.06);border:2px solid transparent;transition:all .18s}
.word-cell:active{transform:scale(.93)}
.word-cell.learned{border-color:#4CAF50}
.wc-emoji{font-size:26px}
.wc-word{font-size:11px;font-weight:700;margin-top:3px;color:#555}
.wc-word.rtl{direction:rtl;font-family:"Noto Naskh Arabic",serif;font-size:13px}

/* RESULT */
.result{text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px 20px;animation:fadeUp .4s ease both}
.result-big{font-size:72px;animation:pop .5s ease both}
</style>

</head>

function catColor(cat){
const k=cat.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z]/g,"");
for(const key of Object.keys(CAT_COLORS)){
if(key.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z]/g,"")===k) return CAT_COLORS[key];
}
return {bg:"#F5F5F5",accent:"#888"};
}

function loadLS(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}

}

ST.page="main";
}

function setState(p){Object.assign(ST,p);render()}
function saveLearned(){
if(!ST.learned)return;
saveLS("learnedV5",{aliya:[...ST.learned.aliya],amira:[...ST.learned.amira]});
}

function getAllWords(){
return[
...WORDS.map(w=>{const k=wKey(w);return ST.overrides[k]?{...w,...ST.overrides[k]}:w;}),
...ST.customWords
];
}
function getFilteredWords(){
const all=getAllWords();
const byCat=ST.cat?all.filter(w=>w.cat===ST.cat):all;
if(!ST.search.trim()) return byCat;
const q=ST.search.toLowerCase();
return byCat.filter(w=>w.fr.toLowerCase().includes(q)||w.en.toLowerCase().includes(q)||w.darija.toLowerCase().includes(q));
}
function getProfile(){return PROFILES.find(p=>p.id===ST.profile)}
function getAvailLangs(){
const p=getProfile();
return p?LANGS.filter(l=>p.langs.includes(l.key)):LANGS;
}
function getLangObj(){return LANGS.find(l=>l.key===ST.lang)||LANGS[0]}
function isLearned(w){
if(!ST.learned||!ST.profile)return false;
return ST.learned[ST.profile].has(lrnKey(w,ST.lang));
}

function confetti(){
const c=["#FFD700","#FF9500","#FF6B9D","#4A90D9","#4CAF50","#9B59B6"];
for(let i=0;i<40;i++){
const el=document.createElement("div");el.className="cp";
const sz=6+Math.random()*12;
el.style.cssText="left:"+Math.random()*100+"%;width:"+sz+"px;height:"+sz+"px;background:"+c[~~(Math.random()*6)]+";animation-delay:"+Math.random()*.6+"s;";
document.body.appendChild(el);setTimeout(()=>el.remove(),2800);
}
}
function toast(msg){
const el=document.createElement("div");el.className="toast";el.textContent=msg;
document.body.appendChild(el);setTimeout(()=>el.remove(),2000);
}

function makeQuiz(pool,lang){
const isRTL=LANGS.find(l=>l.key===lang)?.rtl;
return shuffle(pool).slice(0,10).map(w=>{
const others=shuffle(pool.filter(x=>x.fr!==w.fr)).slice(0,3);
return{word:w,opts:shuffle([w,...others]),lang,isRTL};
});
}

          style="${lrn?`border-color:${cc.accent}66;background:${cc.bg}`:``}">
          <div class="wc-emoji">${w.emoji}</div>
          <div class="wc-word ${isRTL?"rtl":""}" style="color:${cc.accent}">${wordInLang}</div>
          ${lrn?`<div style="font-size:10px;color:#4CAF50">✓</div>`:""}
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

    ${cats.map(c=>`

}
}

function selectProfile(id){
ST.profile=id;
ST.page="main";
ST.lang=PROFILES.find(p=>p.id===id).langs[0];
saveLS("hub_active_profile",id);
render();
}

function toggleFlip(){setState({flipped:!ST.flipped})}

function markAndNext(){
const words=getFilteredWords();
const idx=Math.min(ST.cardIdx,words.length-1);
const w=words[idx];
if(!isLearned(w)){
const k=lrnKey(w,ST.lang);
ST.learned[ST.profile].add(k);
saveLearned();
toast("Appris !");
}
const next=Math.min(idx+1,words.length-1);
setState({cardIdx:next,flipped:false});
}

function prevCard(){
setState({cardIdx:Math.max(0,ST.cardIdx-1),flipped:false});
}

function openWord(i){
setState({screen:"flash",cardIdx:i,flipped:false});
}

function startQuiz(){
const words=getFilteredWords();
if(words.length<4){toast("Il faut au moins 4 mots pour le quiz !");return;}
const pool=makeQuiz(words,ST.lang);
setState({quizPool:pool,quizIdx:0,quizAns:null,quizScore:0,quizDone:false,feedback:""});
}

function answerQuiz(i){
if(ST.quizAns!==null)return;
const Q=ST.quizPool[ST.quizIdx];
const correct=Q.opts[i].fr===Q.word.fr;
const score=correct?ST.quizScore+1:ST.quizScore;
if(correct){
const k=lrnKey(Q.word,ST.lang);
ST.learned[ST.profile].add(k);
saveLearned();
}
ST.quizAns=i;ST.quizScore=score;ST.feedback=correct?"correct":"wrong";
render();
setTimeout(()=>{
const next=ST.quizIdx+1;
if(next>=ST.quizPool.length){
if(score>=ST.quizPool.length*.8)confetti();
setState({quizDone:true});return;
}
setState({quizIdx:next,quizAns:null,feedback:""});
},1000);
}

render();
</script>

</body>
