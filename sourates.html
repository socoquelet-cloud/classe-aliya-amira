<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>✨ Mes Sourates</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Nunito',sans-serif;background:#1a1a2e;color:#fff;-webkit-tap-highlight-color:transparent}
#app{min-height:100vh}

/* ── ACCUEIL ── */
.accueil{min-height:100vh;background:linear-gradient(160deg,#1a1a2e 0%,#16213e 55%,#0f3460 100%);padding:28px 16px 60px}
.hero{text-align:center;margin-bottom:22px;display:flex;flex-direction:column;align-items:center;gap:8px;animation:fadeDown .5s ease both}
.hero-avatar{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#FFD700,#FF8C42);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 4px rgba(255,215,0,.25),0 12px 36px rgba(0,0,0,.4);animation:glow 3s ease-in-out infinite;overflow:hidden}
@keyframes glow{0%,100%{box-shadow:0 0 0 4px rgba(255,215,0,.25),0 12px 36px rgba(0,0,0,.4)}50%{box-shadow:0 0 0 8px rgba(255,215,0,.4),0 16px 50px rgba(255,140,66,.3)}}
.hero h1{font-size:24px;font-weight:900;background:linear-gradient(90deg,#FFD700,#FF8C42);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero .sub{opacity:.5;font-size:13px}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* progress */
.prog-box{background:rgba(255,255,255,.07);border-radius:16px;padding:14px 18px;max-width:440px;margin:0 auto 18px;animation:fadeUp .4s .1s ease both}
.prog-box .lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px}
.prog-box .lbl span:last-child{color:#FFD700;font-weight:800}
.bar-track{background:rgba(255,255,255,.1);border-radius:99px;height:9px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#FFD700,#FF8C42);transition:width .8s cubic-bezier(.4,0,.2,1)}

/* filters */
.filters{display:flex;gap:7px;max-width:440px;margin:0 auto 14px;overflow-x:auto;padding-bottom:4px}
.filter-btn{border:none;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif;transition:all .18s}
.filter-btn.active{background:linear-gradient(135deg,#FFD700,#FF8C42);color:#1a1a2e}
.filter-btn:not(.active){background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}

/* search */
.search-box{max-width:440px;margin:0 auto 14px;position:relative}
.search-box input{width:100%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:14px;padding:10px 14px 10px 36px;color:#fff;font-size:13px;font-family:'Nunito',sans-serif;outline:none}
.search-box input::placeholder{color:rgba(255,255,255,.35)}
.search-box .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.4;font-size:15px}

/* cards */
.sourates-list{display:flex;flex-direction:column;gap:10px;max-width:440px;margin:0 auto}
.sourate-card{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:16px;padding:14px 16px;color:#fff;cursor:pointer;display:flex;align-items:center;gap:14px;transition:transform .15s,box-shadow .15s;animation:fadeUp .35s ease both;position:relative}
.sourate-card:active{transform:scale(.97)}
.sourate-card .num{font-size:10px;opacity:.35;font-weight:700;min-width:20px;text-align:center}
.sourate-card .emoji-wrap{font-size:30px;flex-shrink:0}
.sourate-card .info .name{font-weight:800;font-size:15px}
.sourate-card .info .ar-name{font-family:'Noto Naskh Arabic',serif;font-size:14px;opacity:.6;direction:rtl;margin-top:1px}
.sourate-card .info .sub{font-size:11px;opacity:.35;margin-top:1px}
.sourate-card .right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-left:auto;flex-shrink:0}
.pin-btn{position:absolute;top:8px;right:8px;font-size:14px;background:none;border:none;cursor:pointer;opacity:.4;transition:opacity .2s}
.pin-btn.pinned{opacity:1}
.stars{display:flex;gap:2px}
.star{font-size:13px}
.star.off{filter:grayscale(1) opacity(.2)}
.status-badge{font-size:9px;font-weight:800;border-radius:8px;padding:2px 7px;text-align:center}
.s-none{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.s-todo{background:rgba(255,200,0,.2);color:#FFD700}
.s-learn{background:rgba(255,140,66,.2);color:#FF8C42}
.s-done{background:rgba(76,175,80,.2);color:#81C784}
.juz-header{font-size:11px;font-weight:800;opacity:.35;letter-spacing:1.5px;text-transform:uppercase;padding:14px 0 6px;max-width:440px;margin:0 auto}
.bismillah{text-align:center;opacity:.15;font-size:13px;margin-top:36px;font-family:'Noto Naskh Arabic',serif;direction:rtl}

/* ── PAGE SOURATE ── */
.page{min-height:100vh;background:linear-gradient(160deg,#1a1a2e 0%,#16213e 55%,#0f3460 100%);padding:20px 16px 56px;display:flex;flex-direction:column;align-items:center}
.back-btn{align-self:flex-start;background:none;border:none;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;font-family:'Nunito',sans-serif;padding:4px 0;margin-bottom:14px}
.s-header{text-align:center;margin-bottom:20px}
.s-header .emoji{font-size:42px;display:block;margin-bottom:4px}
.s-header h2{font-size:22px;font-weight:900;margin-bottom:1px}
.s-header .ar-title{font-family:'Noto Naskh Arabic',serif;font-size:18px;opacity:.6;direction:rtl;margin-bottom:2px}
.s-header .sub{font-size:12px;opacity:.35}
.s-header .stars-row{display:flex;justify-content:center;gap:4px;margin-top:6px}

/* status picker */
.status-picker{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;justify-content:center}
.sp-btn{border:none;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .18s}
.sp-btn.active{color:#1a1a2e}
.sp-btn:not(.active){background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}

/* modes */
.modes-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px}
.mode-btn{background:rgba(255,255,255,.07);border-radius:14px;padding:16px 18px;color:#fff;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:4px;border:1px solid rgba(255,255,255,.1);transition:transform .15s;font-family:'Nunito',sans-serif}
.mode-btn:active{transform:scale(.97)}
.mode-title{font-weight:800;font-size:16px}
.mode-desc{font-size:11px;opacity:.4}

/* verset */
.verset-card{background:rgba(255,255,255,.09);border-radius:18px;padding:24px 20px;text-align:center;width:100%;max-width:420px;margin-bottom:18px}
.verset-num{font-size:10px;letter-spacing:2px;opacity:.4;text-transform:uppercase;margin-bottom:12px}
.verset-ar{font-family:'Noto Naskh Arabic',serif;font-size:28px;line-height:2;direction:rtl;color:#FFE082;margin-bottom:14px}
.verset-fr{font-size:13px;opacity:.75;font-style:italic;line-height:1.6}
.verset-ph{font-size:13px;color:#A78BFA;font-style:italic;margin-bottom:10px;line-height:1.5;letter-spacing:.3px}
.audio-btn{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);border-radius:20px;padding:8px 18px;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;margin:0 auto 10px;transition:all .2s}
.audio-btn:active{transform:scale(.95)}
.audio-btn.playing{background:rgba(255,215,0,.2);border-color:#FFD700;color:#FFD700}
.audio-btn.loading{opacity:.6;cursor:wait}
.audio-err{font-size:11px;color:rgba(255,100,100,.8);text-align:center;margin-bottom:8px}
.show-hint{font-size:11px;opacity:.3;cursor:pointer;margin-top:8px}

/* boutons */
.btn{border:none;border-radius:13px;padding:12px 24px;font-weight:800;font-size:14px;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .12s;color:#fff}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.2;cursor:not-allowed}
.btn-ghost{background:rgba(255,255,255,.1)}
.btns-row{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.dots{display:flex;gap:6px;justify-content:center;margin-top:2px;flex-wrap:wrap;max-width:300px}
.dot{width:8px;height:8px;border-radius:50%;cursor:pointer;transition:background .3s}
.checklist{display:flex;gap:5px;justify-content:center;margin-top:7px;flex-wrap:wrap;font-size:16px}

/* quiz */
.quiz-question{background:rgba(255,255,255,.09);border-radius:16px;padding:20px 18px;text-align:center;width:100%;max-width:420px;margin-bottom:14px}
.quiz-hint{font-size:11px;opacity:.45;margin-bottom:10px}
.quiz-options{display:flex;flex-direction:column;gap:9px;width:100%;max-width:420px}
.quiz-option{border:1px solid rgba(255,255,255,.15);border-radius:13px;padding:14px 16px;color:#fff;font-size:13px;cursor:pointer;font-family:'Nunito',sans-serif;text-align:left;font-style:italic;transition:background .25s;background:rgba(255,255,255,.07)}
.quiz-option:active{transform:scale(.98)}
.quiz-option.correct{background:rgba(76,175,80,.4);border-color:#4CAF50}
.quiz-option.wrong{background:rgba(244,67,54,.2);border-color:rgba(244,67,54,.35)}

/* result */
.result-screen{text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px;animation:fadeUp .4s ease both;margin-top:28px}
.big-emoji{font-size:68px;animation:bounceIn .5s ease both}
@keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}

/* confetti */
.cp{position:fixed;top:-20px;border-radius:50%;pointer-events:none;z-index:9999;animation:cfall 2.2s ease-in forwards}
@keyframes cfall{to{transform:translateY(115vh) rotate(720deg);opacity:0}}

/* streak */
.streak-badge{background:rgba(255,140,66,.2);border:1px solid rgba(255,140,66,.4);border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;color:#FF8C42;display:inline-flex;align-items:center;gap:4px}

/* parent modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#1e2a4a;border-radius:20px;padding:24px;width:100%;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,.4)}
.modal h3{font-size:17px;font-weight:900;margin-bottom:14px;color:#FFD700}
.modal input{width:100%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:12px;padding:10px 14px;color:#fff;font-size:16px;font-family:'Nunito',sans-serif;outline:none;letter-spacing:6px;text-align:center;margin-bottom:12px}
.modal-btns{display:flex;gap:8px}
.section-title{font-size:16px;font-weight:800;margin-bottom:16px;text-align:center;opacity:.9}

/* notif toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(30,42,74,.97);border:1.5px solid rgba(255,255,255,.15);border-radius:14px;padding:10px 20px;font-size:13px;font-weight:700;z-index:500;animation:fadeUp .3s ease both;white-space:nowrap}
</style>

</head>

{ num:100,id:"adiyat",    nom:"Al-'Adiyat",   arNom:"العاديات",   emoji:"🐎", couleur:"#FF5722", juz:30, versets:[
{ar:"وَالْعَادِيَاتِ ضَبْحًا",                                       ph:"Wa-l-ʿādiyāti ḍabḥā",fr:"Par les cavales qui courent en soufflant"},
{ar:"فَالْمُورِيَاتِ قَدْحًا",                                       ph:"Fa-l-mūriyāti qadḥā",fr:"Et qui font jaillir des étincelles par leurs sabots"},
{ar:"فَالْمُغِيرَاتِ صُبْحًا",                                       ph:"Fa-l-mughīrāti ṣubḥā",fr:"Et qui attaquent au matin"},
{ar:"فَأَثَرْنَ بِهِ نَقْعًا",                                       ph:"Fa-atharna bihi naqʿā",fr:"Et soulèvent ainsi un nuage de poussière"},
{ar:"فَوَسَطْنَ بِهِ جَمْعًا",                                       ph:"Fa-wasaṭna bihi jamʿā",fr:"Et pénètrent au cœur d'un groupe d'hommes"},
]},
{ num:101,id:"qaria",     nom:"Al-Qari'a",    arNom:"القارعة",    emoji:"💥", couleur:"#D32F2F", juz:30, versets:[
{ar:"الْقَارِعَةُ",                                                  ph:"Al-qāriʿa",fr:"Le Fracas"},
{ar:"مَا الْقَارِعَةُ",                                              ph:"Mā l-qāriʿa",fr:"Qu'est-ce que le Fracas ?"},
{ar:"وَمَا أَدْرَاكَ مَا الْقَارِعَةُ",                              ph:"Wa-mā adrāka mā l-qāriʿa",fr:"Et qui te dira ce qu'est le Fracas ?"},
{ar:"يَوْمَ يَكُونُ النَّاسُ كَالْفَرَاشِ الْمَبْثُوثِ",            ph:"Yawma yakūnu n-nāsu ka-l-farāshi l-mabthūth",fr:"Le jour où les hommes seront comme des papillons épars"},
{ar:"وَتَكُونُ الْجِبَالُ كَالْعِهْنِ الْمَنفُوشِ",                 ph:"Wa-takūnu l-jibālu ka-l-ʿihni l-manfūsh",fr:"Et les montagnes comme de la laine cardée"},
]},
{ num:102,id:"takathur",  nom:"At-Takathur",  arNom:"التكاثر",    emoji:"🏆", couleur:"#455A64", juz:30, versets:[
{ar:"أَلْهَاكُمُ التَّكَاثُرُ",                                      ph:"Alhākumu t-takāthur",fr:"La course aux richesses vous distrait"},
{ar:"حَتَّىٰ زُرْتُمُ الْمَقَابِرَ",                                 ph:"Ḥattā zurtumu l-maqābir",fr:"Jusqu'à ce que vous visitiez les tombeaux"},
{ar:"كَلَّا سَوْفَ تَعْلَمُونَ",                                     ph:"Kallā sawfa taʿlamūn",fr:"Certes non ! Vous saurez bientôt"},
{ar:"ثُمَّ كَلَّا سَوْفَ تَعْلَمُونَ",                               ph:"Thumma kallā sawfa taʿlamūn",fr:"Encore une fois, certes non ! Vous saurez bientôt"},
{ar:"كَلَّا لَوْ تَعْلَمُونَ عِلْمَ الْيَقِينِ",                    ph:"Kallā law taʿlamūna ʿilma l-yaqīn",fr:"Certes non ! Si vous saviez d'une science certaine"},
{ar:"لَتَرَوُنَّ الْجَحِيمَ",                                        ph:"La-tarawunna l-jaḥīm",fr:"Vous verrez sûrement l'Enfer"},
{ar:"ثُمَّ لَتَرَوُنَّهَا عَيْنَ الْيَقِينِ",                        ph:"Thumma la-tarawunnahā ʿayna l-yaqīn",fr:"Puis vous le verrez de la certitude même"},
{ar:"ثُمَّ لَتُسْأَلُنَّ يَوْمَئِذٍ عَنِ النَّعِيمِ",               ph:"Thumma la-tusʾalunna yawmaʾidhin ʿani n-naʿīm",fr:"Puis ce jour-là, vous serez interrogés sur les bienfaits"},
]},
{ num:103,id:"asr",       nom:"Al-'Asr",      arNom:"العصر",      emoji:"⏳", couleur:"#FF8C42", juz:30, versets:[
{ar:"وَالْعَصْرِ",                                                   ph:"Wa-l-ʿaṣr",fr:"Par le Temps"},
{ar:"إِنَّ الْإِنسَانَ لَفِي خُسْرٍ",                               ph:"Inna l-insāna la-fī khusr",fr:"L'homme est vraiment en perdition"},
{ar:"إِلَّا الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ وَتَوَاصَوْا بِالْحَقِّ وَتَوَاصَوْا بِالصَّبْرِ", ph:"Illā lladhīna āmanū wa-ʿamilū ṣ-ṣāliḥāti wa-tawāṣaw bi-l-ḥaqqi wa-tawāṣaw bi-ṣ-ṣabr",fr:"Sauf ceux qui croient, font de bonnes œuvres, s'enjoignent mutuellement la vérité et la patience"},
]},
{ num:104,id:"humaza",    nom:"Al-Humaza",    arNom:"الهمزة",     emoji:"🗣️", couleur:"#C62828", juz:30, versets:[
{ar:"وَيْلٌ لِّكُلِّ هُمَزَةٍ لُّمَزَةٍ",                           ph:"Waylun li-kulli humazatin lumazа",fr:"Malheur à tout calomniateur et médisant"},
{ar:"الَّذِي جَمَعَ مَالًا وَعَدَّدَهُ",                            ph:"Alladhī jamaʿa mālan wa-ʿaddadah",fr:"Qui amasse des richesses et les compte"},
{ar:"يَحْسَبُ أَنَّ مَالَهُ أَخْلَدَهُ",                            ph:"Yaḥsabu anna mālahu akhladah",fr:"Il croit que sa fortune le rendra immortel"},
{ar:"كَلَّا لَيُنبَذَنَّ فِي الْحُطَمَةِ",                          ph:"Kallā la-yunbadhanna fī l-ḥuṭama",fr:"Certes non ! Il sera précipité dans al-Hutama"},
{ar:"وَمَا أَدْرَاكَ مَا الْحُطَمَةُ",                              ph:"Wa-mā adrāka mā l-ḥuṭama",fr:"Et qui te dira ce qu'est al-Hutama ?"},
{ar:"نَارُ اللَّهِ الْمُوقَدَةُ",                                    ph:"Nāru Llāhi l-mūqada",fr:"C'est le feu d'Allah allumé"},
]},
{ num:105,id:"fil",       nom:"Al-Fil",       arNom:"الفيل",      emoji:"🐘", couleur:"#5D4037", juz:30, versets:[
{ar:"أَلَمْ تَرَ كَيْفَ فَعَلَ رَبُّكَ بِأَصْحَابِ الْفِيلِ",      ph:"A-lam tara kayfa faʿala rabbuka bi-aṣḥābi l-fīl",fr:"N'as-tu pas vu comment ton Seigneur a agi avec les gens de l'Éléphant ?"},
{ar:"أَلَمْ يَجْعَلْ كَيْدَهُمْ فِي تَضْلِيلٍ",                    ph:"A-lam yajʿal kaydahum fī taḍlīl",fr:"N'a-t-Il pas rendu vain leur stratagème ?"},
{ar:"وَأَرْسَلَ عَلَيْهِمْ طَيْرًا أَبَابِيلَ",                     ph:"Wa-arsala ʿalayhim ṭayran abābīl",fr:"Et il envoya contre eux des oiseaux en escadrilles"},
{ar:"تَرْمِيهِم بِحِجَارَةٍ مِّن سِجِّيلٍ",                        ph:"Tarmīhim bi-ḥijāratin min sijjīl",fr:"Qui leur lançaient des pierres d'argile"},
{ar:"فَجَعَلَهُمْ كَعَصْفٍ مَّأْكُولٍ",                             ph:"Fa-jaʿalahum ka-ʿaṣfin maʾkūl",fr:"Et les rendit pareils à de la paille mâchée"},
]},
{ num:106,id:"quraysh",   nom:"Quraysh",      arNom:"قريش",       emoji:"🕌", couleur:"#1565C0", juz:30, versets:[
{ar:"لِإِيلَافِ قُرَيْشٍ",                                          ph:"Li-īlāfi quraysh",fr:"Pour la sécurité des Quraysh"},
{ar:"إِيلَافِهِمْ رِحْلَةَ الشِّتَاءِ وَالصَّيْفِ",                ph:"Īlāfihim riḥlata sh-shitāʾi wa-ṣ-ṣayf",fr:"Leur sécurité dans les voyages d'hiver et d'été"},
{ar:"فَلْيَعْبُدُوا رَبَّ هَٰذَا الْبَيْتِ",                        ph:"Fa-l-yaʿbudū rabba hādhā l-bayt",fr:"Qu'ils adorent donc le Seigneur de cette Maison"},
{ar:"الَّذِي أَطْعَمَهُم مِّن جُوعٍ وَآمَنَهُم مِّنْ خَوْفٍ",      ph:"Alladhī aṭʿamahum min jūʿin wa-āmanahum min khawf",fr:"Qui les a nourris contre la faim et les a sécurisés contre la crainte"},
]},
{ num:107,id:"maun",      nom:"Al-Ma'un",     arNom:"الماعون",    emoji:"🤲", couleur:"#00897B", juz:30, versets:[
{ar:"أَرَأَيْتَ الَّذِي يُكَذِّبُ بِالدِّينِ",                      ph:"A-raʾayta lladhī yukadhdhibu bi-d-dīn",fr:"Vois-tu celui qui traite de mensonge la Rétribution ?"},
{ar:"فَذَٰلِكَ الَّذِي يَدُعُّ الْيَتِيمَ",                         ph:"Fa-dhālika lladhī yaduʿʿu l-yatīm",fr:"C'est lui qui repousse l'orphelin"},
{ar:"وَلَا يَحُضُّ عَلَىٰ طَعَامِ الْمِسْكِينِ",                    ph:"Wa-lā yaḥuḍḍu ʿalā ṭaʿāmi l-miskīn",fr:"Et qui n'encourage pas à nourrir le pauvre"},
{ar:"فَوَيْلٌ لِّلْمُصَلِّينَ",                                     ph:"Fa-waylun li-l-muṣallīn",fr:"Malheur donc à ceux qui font la prière"},
{ar:"الَّذِينَ هُمْ عَن صَلَاتِهِمْ سَاهُونَ",                      ph:"Alladhīna hum ʿan ṣalātihim sāhūn",fr:"Qui sont distraits de leur prière"},
{ar:"الَّذِينَ هُمْ يُرَاءُونَ",                                     ph:"Alladhīna hum yurāʾūn",fr:"Qui font de l'ostentation"},
{ar:"وَيَمْنَعُونَ الْمَاعُونَ",                                     ph:"Wa-yamnaʿūna l-māʿūn",fr:"Et qui refusent l'ustensile de service"},
]},
{ num:108,id:"kawthar",   nom:"Al-Kawthar",   arNom:"الكوثر",     emoji:"🌊", couleur:"#1E88E5", juz:30, versets:[
{ar:"إِنَّا أَعْطَيْنَاكَ الْكَوْثَرَ",                              ph:"Innā aʿṭaynāka l-kawthar",fr:"Nous t'avons accordé l'Abondance"},
{ar:"فَصَلِّ لِرَبِّكَ وَانْحَرْ",                                   ph:"Fa-ṣalli li-rabbika wa-nḥar",fr:"Accomplis donc la prière pour ton Seigneur et sacrifie"},
{ar:"إِنَّ شَانِئَكَ هُوَ الْأَبْتَرُ",                              ph:"Inna shāniʾaka huwa l-abtar",fr:"C'est bien ton ennemi qui sera sans postérité"},
]},
{ num:109,id:"kafirun",   nom:"Al-Kafirun",   arNom:"الكافرون",   emoji:"🕊️", couleur:"#5BA4CF", juz:30, versets:[
{ar:"قُلْ يَا أَيُّهَا الْكَافِرُونَ",                              ph:"Qul yā ayyuhā l-kāfirūn",fr:"Dis : Ô vous les mécréants"},
{ar:"لَا أَعْبُدُ مَا تَعْبُدُونَ",                                 ph:"Lā aʿbudu mā taʿbudūn",fr:"Je n'adore pas ce que vous adorez"},
{ar:"وَلَا أَنتُمْ عَابِدُونَ مَا أَعْبُدُ",                        ph:"Wa-lā antum ʿābidūna mā aʿbud",fr:"Et vous n'adorez pas ce que j'adore"},
{ar:"وَلَا أَنَا عَابِدٌ مَّا عَبَدتُّمْ",                          ph:"Wa-lā anā ʿābidun mā ʿabadtum",fr:"Je n'ai jamais adoré ce que vous adorez"},
{ar:"وَلَا أَنتُمْ عَابِدُونَ مَا أَعْبُدُ",                        ph:"Wa-lā antum ʿābidūna mā aʿbud",fr:"Et vous n'adorez pas ce que j'adore"},
{ar:"لَكُمْ دِينُكُمْ وَلِيَ دِينِ",                                ph:"Lakum dīnukum wa-liya dīn",fr:"À vous votre religion, à moi la mienne"},
]},
{ num:110,id:"nasr",      nom:"An-Nasr",      arNom:"النصر",      emoji:"🏳️", couleur:"#43A047", juz:30, versets:[
{ar:"إِذَا جَاءَ نَصْرُ اللَّهِ وَالْفَتْحُ",                      ph:"Idhā jāʾa naṣru Llāhi wa-l-fatḥ",fr:"Quand arrive le secours d'Allah et la victoire"},
{ar:"وَرَأَيْتَ النَّاسَ يَدْخُلُونَ فِي دِينِ اللَّهِ أَفْوَاجًا", ph:"Wa-raʾayta n-nāsa yadkhulūna fī dīni Llāhi afwājā",fr:"Et que tu vois les gens entrer en foule dans la religion d'Allah"},
{ar:"فَسَبِّحْ بِحَمْدِ رَبِّكَ وَاسْتَغْفِرْهُ إِنَّهُ كَانَ تَوَّابًا", ph:"Fa-sabbiḥ bi-ḥamdi rabbika wa-staghfirhu innahu kāna tawwābā",fr:"Célèbre la gloire et les louanges de ton Seigneur, et implore Son pardon. Car Il est certes le Repentant"},
]},
{ num:111,id:"masad",     nom:"Al-Masad",     arNom:"المسد",      emoji:"🔥", couleur:"#E53935", juz:30, versets:[
{ar:"تَبَّتْ يَدَا أَبِي لَهَبٍ وَتَبَّ",                          ph:"Tabbat yadā Abī Lahabin wa-tabb",fr:"Que périssent les deux mains d'Abou Lahab et qu'il périsse lui-même !"},
{ar:"مَا أَغْنَىٰ عَنْهُ مَالُهُ وَمَا كَسَبَ",                    ph:"Mā aghnā ʿanhu māluhu wa-mā kasab",fr:"Sa fortune et ce qu'il a acquis ne lui ont servi à rien"},
{ar:"سَيَصْلَىٰ نَارًا ذَاتَ لَهَبٍ",                              ph:"Sa-yaṣlā nāran dhāta lahab",fr:"Il brûlera dans un feu plein de flammes"},
{ar:"وَامْرَأَتُهُ حَمَّالَةَ الْحَطَبِ",                          ph:"Wa-mraʾatuhu ḥammālata l-ḥaṭab",fr:"Ainsi que sa femme, la porteuse de bois"},
{ar:"فِي جِيدِهَا حَبْلٌ مِّن مَّسَدٍ",                            ph:"Fī jīdihā ḥablun min masad",fr:"À son cou, une corde de fibres de palmier"},
]},
{ num:112,id:"ikhlas",    nom:"Al-Ikhlas",    arNom:"الإخلاص",    emoji:"☝️", couleur:"#FFD700", juz:30, versets:[
{ar:"قُلْ هُوَ اللَّهُ أَحَدٌ",                                     ph:"Qul huwa Allāhu aḥad",fr:"Dis : Il est Allah, l'Unique"},
{ar:"اللَّهُ الصَّمَدُ",                                            ph:"Allāhu ṣ-ṣamad",fr:"Allah, l'Absolu, le Seul recours"},
{ar:"لَمْ يَلِدْ وَلَمْ يُولَدْ",                                   ph:"Lam yalid wa-lam yūlad",fr:"Il n'a pas engendré et n'a pas été engendré"},
{ar:"وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ",                            ph:"Wa-lam yakun lahu kufuwan aḥad",fr:"Et nul n'est égal à Lui"},
]},
{ num:113,id:"falaq",     nom:"Al-Falaq",     arNom:"الفلق",      emoji:"🌅", couleur:"#FF8C42", juz:30, versets:[
{ar:"قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ",                               ph:"Qul aʿūdhu bi-rabbi l-falaq",fr:"Dis : Je cherche refuge auprès du Seigneur de l'Aube"},
{ar:"مِن شَرِّ مَا خَلَقَ",                                         ph:"Min sharri mā khalaq",fr:"Contre le mal de ce qu'Il a créé"},
{ar:"وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ",                             ph:"Wa-min sharri ghāsiqin idhā waqab",fr:"Contre le mal de l'obscurité quand elle s'étend"},
{ar:"وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ",                     ph:"Wa-min sharri n-naffāthāti fī l-ʿuqad",fr:"Contre le mal des souffleuses sur les nœuds"},
{ar:"وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ",                             ph:"Wa-min sharri ḥāsidin idhā ḥasad",fr:"Contre le mal de l'envieux quand il envie"},
]},

{ar:"قُلْ أَعُوذُ بِرَبِّ النَّاسِ",                                ph:"Qul aʿūdhu bi-rabbi n-nās",fr:"Dis : Je cherche refuge auprès du Seigneur des hommes"},
{ar:"مَلِكِ النَّاسِ",                                              ph:"Maliki n-nās",fr:"Le Roi des hommes"},
{ar:"إِلَٰهِ النَّاسِ",                                             ph:"Ilāhi n-nās",fr:"Le Dieu des hommes"},
{ar:"مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ",                          ph:"Min sharri l-waswāsi l-khannās",fr:"Contre le mal du tentateur discret"},
{ar:"الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ",                      ph:"Alladhī yuwaswisu fī ṣudūri n-nās",fr:"Qui souffle le mal dans les cœurs des hommes"},
{ar:"مِنَ الْجِنَّةِ وَالنَّاسِ",                                   ph:"Mina l-jinnati wa-n-nās",fr:"Qu'il soit d'entre les djinns ou les hommes"},

function loadData(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function saveData(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

filter:'all',  // all | pinned | todo | learning | done | none
search:'',

pinned:      loadData('sourates_pinned',[]),
streak:      loadData('sourates_streak',{count:0,last:''}),
showPinModal:false,
parentMode:false,
parentAction:null,
};

function save(){
saveData('sourates_prog',state.progression);
saveData('sourates_status',state.statuses);
saveData('sourates_pinned',state.pinned);
saveData('sourates_streak',state.streak);
}
function setState(p){Object.assign(state,p);render()}

function updateStreak(){
const today=new Date().toDateString();
const s=state.streak;
if(s.last===today)return;
const yesterday=new Date(Date.now()-86400000).toDateString();
s.count=(s.last===yesterday)?s.count+1:1;
s.last=today;
state.streak=s;
saveData('sourates_streak',s);
}

function confetti(){
const c=['#FFD700','#FF8C42','#9B8BE8','#4ECDC4','#FF6B9D','#81C784'];
for(let i=0;i<40;i++){
const el=document.createElement('div');
el.className='cp';
const sz=7+Math.random()*12;
el.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${c[Math.floor(Math.random()*6)]};animation-delay:${Math.random()*.6}s;`;
document.body.appendChild(el);
setTimeout(()=>el.remove(),2800);
}
}

function toast(msg){
const el=document.createElement('div');
el.className='toast';el.textContent=msg;
document.body.appendChild(el);
setTimeout(()=>el.remove(),2000);
}

function makeOptions(s,i){
const correct=s.versets[i];
const others=s.versets.filter((_,j)=>j!==i).sort(()=>Math.random()-.5).slice(0,3);
return [correct,...others].sort(()=>Math.random()-.5);
}

// versetNumber in Quran = sum of previous surahs + idx+1
// We use the sourate.num for the API
app.innerHTML=` <div class="page"> <button class="back-btn" onclick="setState({page:'sourate-menu',idx:0})">← Retour</button> <div class="s-header"><span class="emoji">${sourate.emoji}</span><h2 style="color:${sourate.couleur}">${sourate.nom}</h2></div> <div class="section-title">🎧 Écoute</div> <div class="verset-card"> <div class="verset-num">Verset ${idx+1} / ${sourate.versets.length}</div> <div class="verset-ar">${v.ar}</div> ${v.ph?`<div class="verset-ph">🔤 ${v.ph}</div>`:''} <div class="verset-fr">${v.fr}</div> </div> <button class="audio-btn" id="audio-btn" onclick="playAudio(${sourate.num},${idx+1})"> 🔊 Écouter ce verset </button> <div id="audio-err" class="audio-err" style="display:none"></div> <div class="btns-row"> <button class="btn btn-ghost" onclick="stopAudio();setState({idx:${idx-1}})" ${idx===0?'disabled':''}>← Préc.</button> ${last ?`<button class="btn" style="background:${sourate.couleur}" onclick="stopAudio();setState({page:'sourate-menu',idx:0})">J'ai écouté ✓</button>` :`<button class="btn" style="background:${sourate.couleur}" onclick="stopAudio();setState({idx:${idx+1}})">Suivant →</button>`} </div> <div class="dots">${sourate.versets.map((_,i)=>`<div class="dot" onclick="stopAudio();setState({idx:${i}})" style="background:${i===idx?sourate.couleur:'rgba(255,255,255,0.2)'}"></div>`).join('')}</div> </div>`;
}

// ─ RÉPÉTITION ─
else if(page==='repetition'){
const v=sourate.versets[idx];
const last=idx===sourate.versets.length-1;
app.innerHTML=` <div class="page"> <button class="back-btn" onclick="stopAudio();setState({page:'sourate-menu',idx:0,checked:[],shown:false})">← Retour</button> <div class="s-header"><span class="emoji">${sourate.emoji}</span><h2 style="color:${sourate.couleur}">${sourate.nom}</h2></div> <div class="section-title">🎤 Répète à voix haute</div> <div class="verset-card" onclick="toggleShown()" style="cursor:pointer"> <div class="verset-num">Verset ${idx+1} / ${sourate.versets.length}</div> <div class="verset-ar">${v.ar}</div> ${v.ph?`<div class="verset-ph">🔤 ${v.ph}</div>`:''} ${shown?`<div class="verset-fr">${v.fr}</div>`:`<div class="show-hint">👆 Appuie pour la traduction</div>`} </div> <button class="audio-btn" id="audio-btn" onclick="playAudio(${sourate.num},${idx+1})"> 🔊 Écouter d'abord </button> <div id="audio-err" class="audio-err" style="display:none"></div> <p style="font-size:14px;text-align:center;opacity:.7;margin-bottom:14px">🎤 Répète, puis :</p> <div class="btns-row"> <button class="btn" style="background:${sourate.couleur}" onclick="stopAudio();validerRep()"> ${last?"Bravo, j'ai fini ! 🎉":"Je l'ai dit ! ✓"} </button> </div> <div class="checklist">${sourate.versets.map((_,i)=>`<span>${checked.includes(i)?'✅':'⬜'}</span>`).join('')}</div> </div>`;
}

// ─ QUIZ ─
else if(page==='quiz'){
const v=sourate.versets[idx];
app.innerHTML=`<div class="page"> <button class="back-btn" onclick="setState({page:'sourate-menu',idx:0,quizScore:0,quizReponse:null})">← Retour</button> <div class="s-header"><span class="emoji">${sourate.emoji}</span><h2 style="color:${sourate.couleur}">${sourate.nom}</h2></div> <div class="section-title">🧠 Question ${idx+1} / ${sourate.versets.length}</div> <div class="quiz-question"> <div class="quiz-hint">Quelle est la traduction de ce verset ?</div> <div class="verset-ar" style="font-size:26px">${v.ar}</div> </div> <div class="quiz-options"> ${quizOptions.map((opt,i)=>{ const correct=opt.ar===v.ar; let cls=''; if(quizReponse!==null) cls=correct?'correct':'wrong'; return`<button class="quiz-option ${cls}" onclick="choisir(${i})">${opt.fr}</button>`; }).join('')} </div> </div>`;
}

// ─ RÉSULTAT ─
else if(page==='result'){
const msgs=['Continue comme ça ! 💪','Bien joué ! Tu progresses 🌟','Parfaite ! Tu es une championne ! 🏆'];
app.innerHTML=` <div class="page"> <div class="result-screen"> <div class="big-emoji">🎉</div> <div style="font-size:21px;font-weight:800">${quizScore} / ${sourate.versets.length}</div> <div style="font-size:14px;opacity:.7;text-align:center">${msgs[Math.min(resultEtoiles-1,2)]}</div> <div class="stars" style="transform:scale(1.4);margin:6px 0"> ${[0,1,2].map(j=>`<span class="star ${j<resultEtoiles?'':'off'}">⭐</span>`).join('')} </div> ${resultEtoiles===3?`<div style="font-size:13px;color:#81C784;font-weight:700">Sourate marquée "Acquise" ✅</div>`:''} <button class="btn" style="background:${sourate.couleur};margin-top:8px" onclick="setState({page:'sourate-menu',idx:0,quizScore:0,quizReponse:null})">Continuer →</button> </div> </div>`;
confetti();
}
}

function renderPinModal(){
return `<div class="modal-bg" onclick="setState({showPinModal:false})">
<div class="modal" onclick="event.stopPropagation()">
<h3>🔒 Mode Parental</h3>
<p style="font-size:12px;opacity:.5;margin-bottom:12px">Code PIN (défaut : 1234)</p>
<input type="password" id="pinInput" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')checkPin()"/>
<div class="modal-btns">
<button class="btn btn-ghost" style="flex:1" onclick="setState({showPinModal:false})">Annuler</button>
<button class="btn" style="background:#FFD700;color:#1a1a2e;flex:1" onclick="checkPin()">Entrer</button>
</div>
</div>

  </div>`;
}

// ── Actions ──────────────────────────────────────────
function openSourate(id){
const s=ALL_SOURATES.find(x=>x.id===id);
setState({page:'sourate-menu',sourate:s,idx:0,shown:false,checked:[],quizScore:0,quizReponse:null});
}
function goAccueil(){setState({page:'accueil'})}
function setFilter(f){setState({filter:f})}
function setSearch(v){setState({search:v})}

function togglePin(id){
const p=[...state.pinned];
const i=p.indexOf(id);
if(i>=0)p.splice(i,1); else p.unshift(id);
state.pinned=p; save(); render();
toast(i>=0?'📌 Désépinglée':'📌 Épinglée en haut !');
}

function cycleStatus(id){
const cur=state.statuses[id]||'none';
const next=STATUSES[(STATUSES.indexOf(cur)+1)%STATUSES.length];
state.statuses[id]=next; save(); render();
toast(STATUS_DOT[next]+' '+STATUS_LABEL[next]);
}

function setStatus(id,st){
state.statuses[id]=st; save();
// If done, update progression to 3 stars minimum
if(st==='done'&&(state.progression[id]||0)<3){state.progression[id]=3;save();}
setState({page:'sourate-menu',sourate:ALL_SOURATES.find(s=>s.id===id)});
toast(STATUS_DOT[st]+' '+STATUS_LABEL[st]);
}

function startMode(mode){
if(mode==='quiz') setState({page:'quiz',idx:0,quizOptions:makeOptions(state.sourate,0),quizReponse:null,quizScore:0});
else setState({page:mode,idx:0,shown:false,checked:[]});
}
function toggleShown(){setState({shown:!state.shown})}

function validerRep(){
const {idx,sourate,checked}=state;
const last=idx===sourate.versets.length-1;
if(last) setState({page:'sourate-menu',idx:0,checked:[],shown:false});
else setState({idx:idx+1,checked:[...checked,idx],shown:false});
}

function choisir(i){
if(state.quizReponse!==null)return;
const {sourate,idx,quizOptions,quizScore}=state;
const ok=quizOptions[i].ar===sourate.versets[idx].ar;
const score=ok?quizScore+1:quizScore;
setState({quizReponse:ok?'bon':'faux',quizScore:score});
setTimeout(()=>{
const last=idx===sourate.versets.length-1;
if(last){
const e=score>=sourate.versets.length?3:score>=Math.ceil(sourate.versets.length/2)?2:1;
state.progression[sourate.id]=Math.max(state.progression[sourate.id]||0,e);
if(e===3){state.statuses[sourate.id]='done';}
else if(e>=1&&(!state.statuses[sourate.id]||state.statuses[sourate.id]==='none')){state.statuses[sourate.id]='learning';}
save(); updateStreak();
setState({page:'result',resultEtoiles:e});
} else {
const ni=idx+1;
setState({idx:ni,quizOptions:makeOptions(sourate,ni),quizReponse:null});
}
},900);
}

function checkPin(){
const pin=document.getElementById('pinInput')?.value;
if(pin==='1234'){state.showPinModal=false;state.parentMode=true;toast("👑 Mode parental activé");render();}
else toast("❌ Code incorrect");
}

// ── Audio ─────────────────────────────────────────
// everyayah.com — gratuit, pas de clé API, récitateur : Mishary Al-Afasy
// URL : https://everyayah.com/data/Alafasy_128kbps/SSSAAA.mp3
let _audio = null;

function stopAudio(){
if(_audio){ _audio.pause(); _audio.src=''; _audio=null; }
const btn=document.getElementById('audio-btn');
if(btn){ btn.className='audio-btn'; btn.innerHTML="🔊 Écouter ce verset"; }
const err=document.getElementById('audio-err');
if(err) err.style.display='none';
}

function playAudio(suraNr, ayaNr){
const btn=document.getElementById('audio-btn');
const errEl=document.getElementById('audio-err');

// Si déjà en lecture → stop
if(_audio && !_audio.paused){ stopAudio(); return; }

const sura=String(suraNr).padStart(3,'0');
const aya=String(ayaNr).padStart(3,'0');
const url=`https://everyayah.com/data/Alafasy_128kbps/${sura}${aya}.mp3`;

if(btn){ btn.className='audio-btn loading'; btn.innerHTML='⏳ Chargement...'; }
if(errEl) errEl.style.display='none';

stopAudio();
_audio=new Audio(url);

_audio.oncanplay=()=>{
_audio.play().catch(()=>{
if(btn){ btn.className='audio-btn'; btn.innerHTML="🔊 Écouter ce verset"; }
if(errEl){ errEl.style.display='block'; errEl.textContent="⚠️ Connexion internet nécessaire pour l'audio"; }
});
if(btn){ btn.className='audio-btn playing'; btn.innerHTML='⏸ En lecture...'; }
};
_audio.onended=()=>{ if(btn){ btn.className='audio-btn'; btn.innerHTML="🔊 Écouter à nouveau"; } _audio=null; };
_audio.onerror=()=>{
if(btn){ btn.className='audio-btn'; btn.innerHTML="🔊 Écouter ce verset"; }
if(errEl){ errEl.style.display='block'; errEl.textContent="⚠️ Audio indisponible — vérifiez votre connexion internet"; }
_audio=null;
};
}

render();
</script>
